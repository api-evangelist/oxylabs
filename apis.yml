- aid: oxylabs:oxylabs-ecommerce-scraper-api
  name: Oxylabs E-Commerce Scraper API
  description: Pre-built scraping targets for major e-commerce platforms — Amazon (search, product,
    reviews, questions, best sellers, offer listing, ASIN), Walmart, eBay, Etsy, Target, Best Buy,
    Wayfair, Kroger, Macy's, Home Depot, Lowes, Costco, Wholefoods, Newegg, Idealo, MediaMarkt,
