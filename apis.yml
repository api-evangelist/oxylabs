- aid: oxylabs:oxylabs-web-unblocker
  name: Oxylabs Web Unblocker
  description: AI-driven proxy solution exposed as a single HTTPS endpoint (unblock.oxylabs.io:60000)
    that handles proxy rotation, browser fingerprinting, JavaScript rendering, CAPTCHA solving, and
    bot-mitigation bypass automatically. Used as a drop-in proxy in any HTTP client; returns rendered
    HTML. Supports custom headers, geo-targeting, and beta browser instructions.
  humanURL: https://developers.oxylabs.io/products/web-unblocker
  baseURL: https://unblock.oxylabs.io:60000
  tags:
