apis:
- aid: oxylabs:oxylabs-web-scraper-api
  name: Oxylabs Web Scraper API
  description: General-purpose web scraping API that returns rendered HTML and structured JSON from
    public web pages. Two delivery modes — Realtime (synchronous request/response against
    realtime.oxylabs.io) and Push-Pull (asynchronous job submission with polling or callback against
    data.oxylabs.io). Supports JavaScript rendering, geo-targeting, locale, custom headers, parsing
    instructions, browser instructions, and pluggable parsers for SERP, e-commerce, real-estate, and
    universal targets. Authentication is HTTP Basic with sub-account credentials.
  humanURL: https://developers.oxylabs.io/scraping-solutions/web-scraper-api
  baseURL: https://realtime.oxylabs.io/v1
  tags:
  - Data Extraction
  - JavaScript Rendering
  - Scraper API
  - Scraping
  - Web Data
  - Web Intelligence
