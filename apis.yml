- aid: oxylabs:oxylabs-serp-scraper-api
  name: Oxylabs SERP Scraper API
  description: Search-engine results page scraping for Google (Search, Ads, Images, Lens, Maps, Suggest,
    Shopping, Travel, Trends, AI Overviews, AI Mode), Bing (Search, Hotels), Baidu, Yandex, DuckDuckGo,
    Naver, and others. Returns structured JSON results with built-in localization (geo_location,
    locale, domain), pagination, and JavaScript-rendered SERP features. Same submission contract as
    Web Scraper API.
