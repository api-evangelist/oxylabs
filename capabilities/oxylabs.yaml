      call: oxylabs.listsubusers
      outputParameters:
      - type: object
        mapping: $.
    - name: create-sub-user
      description: Create a sub-user
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: oxylabs.createsubuser
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-sub-user
      description: Get sub-user
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: oxylabs.getsubuser
      outputParameters:
      - type: object
        mapping: $.
    - name: update-sub-user
